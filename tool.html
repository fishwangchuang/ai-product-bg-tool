<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AI商品图换背景 · Fish网创</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#0f0f0f;--ink2:#3a3a3a;--ink3:#888;
  --bg:#fafaf8;--surface:#f3f2ee;
  --gold:#c8a96e;--radius:12px;
}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 5vw;height:56px;
  background:rgba(250,250,248,.95);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(0,0,0,.06);
}
.logo{font-size:17px;font-weight:500;text-decoration:none;color:var(--ink)}
.logo span{color:var(--gold)}
.back{font-size:13px;color:var(--ink3);text-decoration:none;display:flex;align-items:center;gap:4px}
.back:hover{color:var(--ink)}

.wrap{max-width:780px;margin:0 auto;padding:80px 20px 60px}
.page-title{font-size:22px;font-weight:500;margin-bottom:6px}
.page-sub{font-size:14px;color:var(--ink3);margin-bottom:32px}

/* API Key */
.api-box{
  background:#fff;border:1px solid rgba(0,0,0,.08);
  border-radius:var(--radius);padding:20px;margin-bottom:24px;
}
.api-box label{font-size:13px;color:var(--ink3);display:block;margin-bottom:8px}
.api-row{display:flex;gap:8px}
.api-row input{
  flex:1;padding:10px 14px;border:1px solid rgba(0,0,0,.1);
  border-radius:8px;font-size:14px;font-family:monospace;
  background:#fafafa;outline:none;
}
.api-row input:focus{border-color:var(--gold)}
.btn-sm{
  padding:10px 16px;border-radius:8px;
  border:1px solid rgba(0,0,0,.1);background:#fff;
  font-size:13px;cursor:pointer;color:var(--ink2);white-space:nowrap;
}
.btn-sm:hover{background:var(--surface)}
.api-hint{font-size:12px;color:var(--ink3);margin-top:8px}
.api-hint a{color:var(--gold);text-decoration:none}
.api-hint a:hover{text-decoration:underline}

/* 主区域 */
.main-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
@media(max-width:560px){.main-grid{grid-template-columns:1fr}}

.card{background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:var(--radius);overflow:hidden}
.card-head{
  padding:14px 16px;border-bottom:1px solid rgba(0,0,0,.06);
  font-size:13px;font-weight:500;color:var(--ink2);
  display:flex;align-items:center;gap:6px;
}

/* 上传区 */
.upload-zone{
  height:220px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;
  cursor:pointer;transition:background .15s;position:relative;
  background:#fafafa;
}
.upload-zone:hover{background:#f3f2ee}
.upload-zone.drag{background:#fef9ec;border:2px dashed var(--gold)}
.upload-zone img.preview{
  position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:12px;
}
.upload-icon{font-size:32px;opacity:.3}
.upload-text{font-size:13px;color:var(--ink3)}

/* 预览区 */
.preview-zone{
  height:220px;display:flex;align-items:center;justify-content:center;
  background:#fafafa;position:relative;overflow:hidden;
}
.preview-zone img{width:100%;height:100%;object-fit:contain;padding:12px}
.preview-empty{font-size:13px;color:var(--ink3);text-align:center;padding:20px}

/* 按钮 */
.btn-main{
  width:100%;padding:13px;
  background:var(--ink);color:#fff;
  border:none;border-radius:8px;
  font-size:14px;font-weight:500;
  cursor:pointer;display:flex;align-items:center;
  justify-content:center;gap:8px;
  transition:opacity .15s;font-family:'Noto Sans SC',sans-serif;
}
.btn-main:hover{opacity:.85}
.btn-main:disabled{opacity:.4;cursor:not-allowed}
.btn-dl{
  width:100%;padding:13px;
  background:#fff;color:var(--ink);
  border:1px solid rgba(0,0,0,.12);border-radius:8px;
  font-size:14px;font-weight:500;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:background .15s;font-family:'Noto Sans SC',sans-serif;
}
.btn-dl:hover{background:var(--surface)}
.btn-dl:disabled{opacity:.4;cursor:not-allowed}

.btn-wrap{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
@media(max-width:560px){.btn-wrap{grid-template-columns:1fr}}

/* 背景选择 */
.bg-card{background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:var(--radius);padding:20px}
.bg-title{font-size:13px;font-weight:500;color:var(--ink2);margin-bottom:14px}
.bg-grid{display:flex;flex-wrap:wrap;gap:10px}
.bg-swatch{
  width:48px;height:48px;border-radius:8px;
  cursor:pointer;border:2px solid transparent;
  transition:transform .12s,border-color .12s;
  position:relative;display:flex;align-items:center;justify-content:center;
  font-size:18px;
}
.bg-swatch:hover{transform:scale(1.08)}
.bg-swatch.active{border-color:var(--gold)}
.bg-swatch .check{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:18px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.4);
}
.bg-add{
  width:48px;height:48px;border-radius:8px;
  border:1.5px dashed rgba(0,0,0,.15);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;color:var(--ink3);background:#fafafa;
  transition:background .12s;
}
.bg-add:hover{background:var(--surface)}

/* 错误 */
.err{
  background:#fff5f5;border:1px solid #ffc9c9;
  border-radius:8px;padding:12px 16px;
  font-size:13px;color:#c0392b;margin-bottom:16px;
}

/* loading dots */
@keyframes dot{0%,80%,100%{opacity:.2}40%{opacity:1}}
.dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:#fff;margin:0 2px;animation:dot 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
</style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">Fish<span>网创</span></a>
  <a class="back" href="index.html">← 返回首页</a>
</nav>

<div class="wrap">
  <h1 class="page-title">AI 商品图换背景</h1>
  <p class="page-sub">上传商品图 → AI 自动抠图 → 选背景 → 下载成品图</p>

  <!-- API Key -->
  <div class="api-box">
    <label>remove.bg API Key（首次使用需填写）</label>
    <div class="api-row">
      <input type="password" id="apiKey" placeholder="粘贴你的 API Key..." autocomplete="off"/>
      <button class="btn-sm" onclick="toggleKey()">显示</button>
    </div>
    <p class="api-hint">
      还没有 Key？<a href="https://www.remove.bg/api" target="_blank">免费注册 remove.bg</a>，每月500次免费额度 ↗
    </p>
  </div>

  <div id="errBox" class="err" style="display:none"></div>

  <!-- 上传 + 预览 -->
  <div class="main-grid">
    <div class="card">
      <div class="card-head">① 上传商品图</div>
      <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()"
        ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
        <div class="upload-icon">📷</div>
        <div class="upload-text">点击或拖拽上传</div>
        <div class="upload-text" style="font-size:11px">JPG / PNG</div>
        <img id="origPreview" class="preview" style="display:none"/>
      </div>
      <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="onFileSelect(event)"/>
    </div>

    <div class="card">
      <div class="card-head">③ 换背景预览</div>
      <div class="preview-zone" id="resultZone">
        <div class="preview-empty" id="resultEmpty">抠图完成后<br/>在这里预览效果</div>
        <img id="resultPreview" style="display:none;width:100%;height:100%;object-fit:contain;padding:12px"/>
      </div>
    </div>
  </div>

  <!-- 操作按钮 -->
  <div class="btn-wrap">
    <button class="btn-main" id="btnRemove" onclick="removeBackground()" disabled>
      ✨ ② 一键 AI 抠图
    </button>
    <button class="btn-dl" id="btnDl" onclick="downloadResult()" disabled>
      ⬇ 下载成品图
    </button>
  </div>

  <!-- 背景选择 -->
  <div class="bg-card">
    <div class="bg-title">④ 选择背景（抠图完成后生效）</div>
    <div class="bg-grid" id="bgGrid"></div>
    <input type="file" id="bgFileInput" accept="image/*" style="display:none" onchange="onCustomBg(event)"/>
  </div>
</div>

<script>
const PRESETS = [
  {label:'纯白',type:'color',value:'#ffffff'},
  {label:'浅灰',type:'color',value:'#f4f4f4'},
  {label:'米白',type:'color',value:'#fdf6ec'},
  {label:'纯黑',type:'color',value:'#111111'},
  {label:'天蓝',type:'gradient',value:['#e8f4fd','#ffffff']},
  {label:'粉渐变',type:'gradient',value:['#fde8f0','#ffffff']},
  {label:'金渐变',type:'gradient',value:['#fef9ec','#ffffff']},
  {label:'紫渐变',type:'gradient',value:['#f0eafe','#ffffff']},
  {label:'深科技',type:'gradient',value:['#1a1a2e','#16213e']},
  {label:'高级灰',type:'gradient',value:['#e8e8e8','#f8f8f8']},
];

let selectedBg = PRESETS[0];
let fgDataUrl = null;
let resultDataUrl = null;
let customBgUrl = null;

// 渲染背景选择
function renderBgGrid() {
  const grid = document.getElementById('bgGrid');
  grid.innerHTML = '';
  PRESETS.forEach((bg, i) => {
    const el = document.createElement('div');
    el.className = 'bg-swatch' + (selectedBg === bg ? ' active' : '');
    el.title = bg.label;
    if (bg.type === 'color') el.style.background = bg.value;
    else el.style.background = `linear-gradient(135deg,${bg.value[0]},${bg.value[1]})`;
    if (selectedBg === bg) el.innerHTML = '<span class="check">✓</span>';
    el.onclick = () => { selectedBg = bg; renderBgGrid(); applyBg(); };
    grid.appendChild(el);
  });
  // 自定义
  if (customBgUrl) {
    const el = document.createElement('div');
    el.className = 'bg-swatch' + (selectedBg.type === 'image' ? ' active' : '');
    el.style.background = `url(${customBgUrl}) center/cover`;
    el.title = '自定义背景';
    if (selectedBg.type === 'image') el.innerHTML = '<span class="check">✓</span>';
    el.onclick = () => { selectedBg = {type:'image',value:customBgUrl}; renderBgGrid(); applyBg(); };
    grid.appendChild(el);
  }
  // 加号
  const add = document.createElement('div');
  add.className = 'bg-add';
  add.title = '上传自定义背景';
  add.textContent = '+';
  add.onclick = () => document.getElementById('bgFileInput').click();
  grid.appendChild(add);
}
renderBgGrid();

// 文件处理
function onFileSelect(e) { loadFile(e.target.files[0]); }
function onDrop(e) { e.preventDefault(); onDragLeave(); loadFile(e.dataTransfer.files[0]); }
function onDragOver(e) { e.preventDefault(); document.getElementById('dropZone').classList.add('drag'); }
function onDragLeave() { document.getElementById('dropZone').classList.remove('drag'); }

function loadFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  window._origFile = file;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById('origPreview');
    img.src = e.target.result;
    img.style.display = 'block';
  };
  reader.readAsDataURL(file);
  document.getElementById('btnRemove').disabled = false;
  hideErr();
}

function onCustomBg(e) {
  const file = e.target.files[0];
  if (!file) return;
  customBgUrl = URL.createObjectURL(file);
  selectedBg = {type:'image', value: customBgUrl};
  renderBgGrid();
  applyBg();
}

// 抠图
async function removeBackground() {
  const key = document.getElementById('apiKey').value.trim();
  if (!key) { showErr('请先填写 remove.bg API Key'); return; }
  if (!window._origFile) { showErr('请先上传商品图'); return; }

  const btn = document.getElementById('btnRemove');
  btn.disabled = true;
  btn.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span> AI 抠图中...';
  hideErr();

  try {
    const form = new FormData();
    form.append('image_file', window._origFile);
    form.append('size', 'auto');
    const res = await fetch('https://api.remove.bg/v1.0/removebg', {
      method: 'POST',
      headers: {'X-Api-Key': key},
      body: form
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.errors?.[0]?.title || `API错误 ${res.status}`);
    }
    const blob = await res.blob();
    const reader = new FileReader();
    reader.onload = async e => {
      fgDataUrl = e.target.result;
      await applyBg();
      document.getElementById('btnDl').disabled = false;
    };
    reader.readAsDataURL(blob);
  } catch(e) {
    showErr('抠图失败：' + e.message);
  }
  btn.disabled = false;
  btn.innerHTML = '✨ ② 一键 AI 抠图';
}

// 合成背景
function applyBg() {
  if (!fgDataUrl) return Promise.resolve();
  return new Promise(resolve => {
    const size = 800;
    const canvas = document.createElement('canvas');
    canvas.width = canvas.height = size;
    const ctx = canvas.getContext('2d');
    const bg = selectedBg;

    const drawFg = () => {
      const fg = new Image();
      fg.onload = () => {
        const scale = Math.min(size/fg.width, size/fg.height) * 0.85;
        const w = fg.width*scale, h = fg.height*scale;
        ctx.drawImage(fg, (size-w)/2, (size-h)/2, w, h);
        resultDataUrl = canvas.toDataURL('image/png');
        const img = document.getElementById('resultPreview');
        img.src = resultDataUrl;
        img.style.display = 'block';
        document.getElementById('resultEmpty').style.display = 'none';
        resolve();
      };
      fg.src = fgDataUrl;
    };

    if (bg.type === 'color') {
      ctx.fillStyle = bg.value;
      ctx.fillRect(0,0,size,size);
      drawFg();
    } else if (bg.type === 'gradient') {
      const g = ctx.createLinearGradient(0,0,size,size);
      g.addColorStop(0, bg.value[0]);
      g.addColorStop(1, bg.value[1]);
      ctx.fillStyle = g;
      ctx.fillRect(0,0,size,size);
      drawFg();
    } else if (bg.type === 'image') {
      const bgImg = new Image();
      bgImg.onload = () => { ctx.drawImage(bgImg,0,0,size,size); drawFg(); };
      bgImg.src = bg.value;
    }
  });
}

function downloadResult() {
  if (!resultDataUrl) return;
  const a = document.createElement('a');
  a.href = resultDataUrl;
  a.download = 'product_' + Date.now() + '.png';
  a.click();
}

function toggleKey() {
  const inp = document.getElementById('apiKey');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function showErr(msg) {
  const box = document.getElementById('errBox');
  box.textContent = '⚠ ' + msg;
  box.style.display = 'block';
}
function hideErr() { document.getElementById('errBox').style.display = 'none'; }
</script>
</body>
</html>
